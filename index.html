<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilen Pokorn — CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-grid" id="bgGrid"></div>

<div class="board-bg" id="boardBg" aria-hidden="true"></div>

<nav>
  <div class="nav-logo"><span>Tilen Pokorn</span> <span data-i18n="nav.logoSuffix"></span></div>
  <div class="nav-links">
    <a href="#hero" data-i18n="nav.home"></a>
    <a href="#about" data-i18n="nav.about"></a>
    <a href="#skills" data-i18n="nav.skills"></a>
    <a href="#education" data-i18n="nav.education"></a>
    <a href="#experience" data-i18n="nav.experience"></a>
    <a href="#contact" data-i18n="nav.contact"></a>
    <button class="lang-toggle" data-i18n-toggle type="button"></button>
  </div>
</nav>

<div class="page-wrap">

  <section id="hero">
    <div class="hero-tag fade-in" data-i18n="hero.tag"></div>
    <h1 class="fade-in d1"><span data-i18n="hero.firstName"></span><br><em data-i18n="hero.lastName"></em></h1>
    <p class="hero-sub fade-in d2" data-i18n="hero.sub"></p>
    <div class="hero-links fade-in d3">
      <a href="#contact" class="btn" data-i18n="hero.cta"></a>
      <a href="https://github.com/tilnp" class="btn btn-ghost" data-i18n="hero.github"></a>
      <a href="/cv.pdf" class="btn btn-ghost" data-i18n="hero.resume"></a>
    </div>
  </section>

  <section id="about" data-board-step="0">
    <div class="section-label" data-i18n="about.label"></div>
    <h2 class="fade-in" data-i18n="about.title"></h2>
    <div class="about-text fade-in d1">
      <p data-i18n-html="about.p1"></p>
      <p data-i18n-html="about.p2"></p>
      <p data-i18n-html="about.p3"></p>
    </div>
  </section>

  <section id="skills" data-board-step="1">
    <div class="section-label" data-i18n="skills.label"></div>
    <h2 class="fade-in" data-i18n="skills.title"></h2>
    <div class="skills-grid fade-in d1" data-render="skills"></div>
  </section>

  <section id="education" data-board-step="2">
    <div class="section-label" data-i18n="education.label"></div>
    <h2 class="fade-in" data-i18n="education.title"></h2>
    <div class="fade-in d1" data-render="education"></div>
  </section>

  <section id="experience" data-board-step="3">
    <div class="section-label" data-i18n="experience.label"></div>
    <h2 class="fade-in" data-i18n="experience.title"></h2>
    <div class="lab-grid fade-in d1" data-render="experience"></div>
  </section>

  <section id="contact" data-board-step="4">
    <div class="section-label" data-i18n="contact.label"></div>
    <h2 class="fade-in" data-i18n="contact.title"></h2>
    <div class="contact-links fade-in d1" data-render="contact"></div>
  </section>

</div>

<button class="next-section" type="button" id="nextBtn" aria-label="Next section">↓</button>

<footer>
  <span class="footer-text">tilen pokorn — <span id="year"></span></span>
  <span class="footer-text" data-i18n="footer.tagline"></span>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
